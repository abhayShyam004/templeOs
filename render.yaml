services:
  - type: web
    name: templeos-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:push && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: templeos-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: templeos-db
    plan: free
